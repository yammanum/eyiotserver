<style>
  /* ── 라벤더 테마 컬러 변수 정의 (기존에 없다면 추가) ── */
  :root {
      --lavender-light: #f3e8ff;
      --lavender-mid: #c084fc;
      --lavender-deep: #7e22ce;
      --bg-gradient-1: #fbf7ff;
      --bg-gradient-2: #efe5fd;
      --bg-gradient-3: #e0d0f9;
  }

  /* ── 웹페이지 전체 배경 디자인 ── */
  body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      /* 부드럽고 몽환적인 라벤더 그라데이션 배경 */
      background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2), var(--bg-gradient-3));
      background-size: 400% 400%;
      /* 배경이 은은하게 움직이는 애니메이션 효과 */
      animation: gradientShift 15s ease infinite;
      font-family: 'Malgun Gothic', sans-serif;
      overflow-x: hidden;
  }

  /* 배경 움직임 애니메이션 */
  @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
  }

  /* ── 캐릭터 박스 디자인 업그레이드 (기존 .game-container 수정) ── */
  .game-container {
      position: relative;
      text-align: center;
      margin: 30px auto;
      padding: 20px;
      /* 입체감 있는 투명 유리를 얹은 듯한 글래스모피즘 스타일 */
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 50%;
      width: 220px;
      height: 220px;
      box-shadow: 0 10px 25px rgba(126, 34, 206, 0.1);
      border: 3px dotted var(--lavender-mid);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: all 0.5s ease;
  }

  /* 마우스를 올렸을 때 반응하는 효과 */
  .game-container:hover {
      transform: scale(1.03);
      box-shadow: 0 15px 30px rgba(126, 34, 206, 0.15);
      background: rgba(255, 255, 255, 0.75);
  }

  #char-emoji {
      font-size: 85px;
      filter: drop-shadow(0 8px 12px rgba(126, 34, 206, 0.2));
      cursor: pointer;
      user-select: none;
      transition: transform 0.2s;
  }
  
  #char-emoji:active {
      transform: scale(0.9); /* 누를 때 쏙 들어가는 효과 */
  }

  /* ... 기존의 exp-bar, bee, floating-text 스타일은 그대로 유지 ... */
</style>
