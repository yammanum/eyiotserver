<!-- 스타일 섹션에 추가/수정 -->
<style>
  /* ... 기존 스타일 유지 ... */

  /* ── 게임 요소: 라벤더 캐릭터 ── */
  .game-container {
      position: relative;
      text-align: center;
      margin: 20px 0;
      padding: 20px;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      width: 200px;
      height: 200px;
      margin-left: auto;
      margin-right: auto;
      border: 4px dashed var(--lavender-light);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: all 0.5s;
  }

  #char-emoji {
      font-size: 80px;
      filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
      cursor: pointer;
      user-select: none;
  }

  .exp-bar-container {
      width: 100%;
      height: 10px;
      background: #eee;
      border-radius: 5px;
      margin-top: 10px;
      overflow: hidden;
  }

  #exp-fill {
      width: 0%;
      height: 100%;
      background: var(--lavender-mid);
      transition: width 0.3s;
  }

  /* ── 미니게임: 벌 ── */
  .bee {
      position: fixed;
      font-size: 24px;
      cursor: crosshair;
      z-index: 100;
      transition: transform 0.1s;
      user-select: none;
  }

  .floating-text {
      position: absolute;
      color: var(--lavender-deep);
      font-weight: bold;
      animation: fadeUp 1s forwards;
      pointer-events: none;
  }

  @keyframes fadeUp {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-50px); }
  }
</style>

<!-- 센서 카드 윗부분에 배치 -->
<div class="game-container" id="gameBox">
  <div id="char-emoji">🌿</div>
  <div style="font-size: 0.8rem; font-weight: bold; color: var(--lavender-deep);">
      LV.<span id="lvl-num">1</span> 라벤더
  </div>
  <div class="exp-bar-container">
      <div id="exp-fill"></div>
  </div>
  <p id="garden-msg" style="font-size: 0.7rem; margin-top: 5px; color: #666;">평화로운 정원입니다.</p>
</div>

<!-- 스크립트 섹션에 추가 -->
<script>
  let exp = 0;
  let lv = 1;

  // 1. 캐릭터 상태 업데이트 (온습도 연동)
  function updateCharacter(temp, hum) {
      const emojiEl = $('char-emoji');
      const msgEl = $('garden-msg');
      
      if (temp > 28) {
          emojiEl.textContent = '🥵';
          msgEl.textContent = '너무 더워요! 선풍기를 틀어주세요.';
      } else if (hum < 40) {
          emojiEl.textContent = '🥀';
          msgEl.textContent = '목이 말라요... 물이 필요해요.';
      } else if (temp < 15) {
          emojiEl.textContent = '🥶';
          msgEl.textContent = '추워요! 따뜻하게 해주세요.';
      } else {
          emojiEl.textContent = '🌸';
          msgEl.textContent = '기분이 최고예요! 무럭무럭 자라는 중.';
      }
      
      // 데이터 갱신될 때마다 경험치 상승
      gainExp(10);
  }

  // 2. 경험치 및 레벨업 시스템
  function gainExp(amount) {
      exp += amount;
      if (exp >= 100) {
          exp = 0;
          lv++;
          $('lvl-num').textContent = lv;
          showFloatingText($('gameBox'), "LEVEL UP! ✨");
      }
      $('exp-fill').style.width = exp + '%';
  }

  function showFloatingText(parent, text) {
      const span = document.createElement('span');
      span.className = 'floating-text';
      span.textContent = text;
      parent.appendChild(span);
      setTimeout(() => span.remove(), 1000);
  }

  // 3. 미니 게임: 벌 잡기
  function spawnBee() {
      const bee = document.createElement('div');
      bee.className = 'bee';
      bee.textContent = '🐝';
      bee.style.left = Math.random() * 90 + 'vw';
      bee.style.top = Math.random() * 90 + 'vh';
      
      bee.onclick = () => {
          gainExp(5);
          showFloatingText(bee, "+5 EXP");
          bee.textContent = '✨';
          setTimeout(() => bee.remove(), 200);
      };
      
      document.body.appendChild(bee);
      
      // 5초 뒤에 사라짐
      setTimeout(() => { if(bee) bee.remove(); }, 5000);
  }

  // 10초마다 벌 등장 확률
  setInterval(() => {
      if (Math.random() > 0.7) spawnBee();
  }, 10000);

      // ... 기존 코드 ...
  }
  */
</script>
